<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Exercises</title>
</head>
<body>

<h1>Open the console to see results</h1>

<script>
// =========================
// 🌟 Exercise 1: List of People
// =========================
const people = ["Greg", "Mary", "Devon", "James"];

// Remove Greg
people.shift();

// Replace James with Jason
people[people.indexOf("James")] = "Jason";

// Add your name
people.push("Sharon");

// Mary's index
console.log("Mary index:", people.indexOf("Mary"));

// Copy without Mary and your name
let copy = people.slice(1, 3);
console.log("Copy:", copy);

// Index of Foo
console.log("Foo index:", people.indexOf("Foo")); // -1

// Last element
let last = people[people.length - 1];
console.log("Last element:", last);

// ===== Loops =====
console.log("Loop all:");
for (let i = 0; i < people.length; i++) {
    console.log(people[i]);
}

console.log("Stop at Devon:");
for (let i = 0; i < people.length; i++) {
    console.log(people[i]);
    if (people[i] === "Devon") break;
}


// =========================
// 🌟 Exercise 2: Colors
// =========================
const colors = ["blue", "red", "green", "black", "purple"];

console.log("Basic:");
for (let i = 0; i < colors.length; i++) {
    console.log(`My #${i + 1} choice is ${colors[i]}`);
}

// Bonus
const suffix = ["st", "nd", "rd", "th", "th"];

console.log("Bonus:");
for (let i = 0; i < colors.length; i++) {
    console.log(`My ${i + 1}${suffix[i]} choice is ${colors[i]}`);
}


// =========================
// 🌟 Exercise 3: Repeat Question
// =========================
let number;

do {
    number = prompt("Enter a number:");
    console.log("Type:", typeof number);
    number = Number(number);
} while (number < 10);


// =========================
// 🌟 Exercise 4: Building
// =========================
const building = {
    numberOfFloors: 4,
    numberOfAptByFloor: {
        firstFloor: 3,
        secondFloor: 4,
        thirdFloor: 9,
        fourthFloor: 2,
    },
    nameOfTenants: ["Sarah", "Dan", "David"],
    numberOfRoomsAndRent:  {
        sarah: [3, 990],
        dan:  [4, 1000],
        david: [1, 500],
    },
};

console.log("Floors:", building.numberOfFloors);
console.log("1st floor apts:", building.numberOfAptByFloor.firstFloor);
console.log("3rd floor apts:", building.numberOfAptByFloor.thirdFloor);

console.log("Second tenant:", building.nameOfTenants[1]);
console.log("Rooms:", building.numberOfRoomsAndRent.dan[0]);

let sarahRent = building.numberOfRoomsAndRent.sarah[1];
let davidRent = building.numberOfRoomsAndRent.david[1];
let danRent = building.numberOfRoomsAndRent.dan[1];

if (sarahRent + davidRent > danRent) {
    building.numberOfRoomsAndRent.dan[1] = 1200;
}

console.log("Updated Dan rent:", building.numberOfRoomsAndRent.dan[1]);


// =========================
// 🌟 Exercise 5: Family
// =========================
const family = {
    father: "John",
    mother: "Jane",
    child: "Chris"
};

console.log("Keys:");
for (let key in family) {
    console.log(key);
}

console.log("Values:");
for (let key in family) {
    console.log(family[key]);
}


// =========================
// 🌟 Exercise 6: Rudolf
// =========================
const details = {
  my: 'name',
  is: 'Rudolf',
  the: 'reindeer'
};

let sentence = "";

for (let key in details) {
    sentence += key + " " + details[key] + " ";
}

console.log(sentence.trim());


// =========================
// 🌟 Exercise 7: Secret Group
// =========================
const names = ["Jack", "Philip", "Sarah", "Amanda", "Bernard", "Kyle"];

let letters = names.map(name => name[0]);
letters.sort();

let societyName = letters.join("");

console.log("Secret Society:", societyName);

</script>

</body>
</html>
