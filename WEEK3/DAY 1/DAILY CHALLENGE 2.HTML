<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Pattern</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        pre {
            font-size: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<h2>⭐ Star Pattern (One Loop)</h2>
<pre id="oneLoop"></pre>

<h2>⭐ Star Pattern (Nested Loops)</h2>
<pre id="nestedLoop"></pre>

<script>
    // ✅ 1. Using ONE loop
    let pattern1 = "";

    for (let i = 1; i <= 6; i++) {
        pattern1 += "* ".repeat(i) + "\n";
    }

    document.getElementById("oneLoop").textContent = pattern1;


    // ✅ 2. Using NESTED loops
    let pattern2 = "";

    for (let i = 1; i <= 6; i++) {
        for (let j = 1; j <= i; j++) {
            pattern2 += "* ";
        }
        pattern2 += "\n";
    }

    document.getElementById("nestedLoop").textContent = pattern2;
</script>

</body>
</html>
