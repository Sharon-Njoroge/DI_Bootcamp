<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coloring Squares - Pro</title>
    <link rel="stylesheet" href="EXERCISE 1.CSS">
</head>
<body>
    <div class="controls">
        <div id="palette">
            <div class="swatch" style="background: #ff4757;" data-color="#ff4757"></div>
            <div class="swatch" style="background: #2ed573;" data-color="#2ed573"></div>
            <div class="swatch" style="background: #1e90ff;" data-color="#1e90ff"></div>
            <div class="swatch" style="background: #ffa502;" data-color="#ffa502"></div>
            <div class="swatch" style="background: #ffffff; border: 1px solid #ddd;" data-color="#ffffff"></div>
        </div>
        <div class="actions">
            <button id="save-btn">Save to Browser</button>
            <button id="load-btn">Load Last Save</button>
            <button id="clear-btn">Clear Canvas</button>
        </div>
    </div>

    <div id="grid-container"></div>

    <script src="EXERCISE 1.JS"></script>
</body>
</html>
