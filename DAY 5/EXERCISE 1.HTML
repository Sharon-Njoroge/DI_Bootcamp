<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars Character Finder</title>
    <link rel="stylesheet" href="EXERCISE 1.CSS">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Star_Wars_Logo.svg" alt="Star Wars" class="logo">
        
        <div id="content-box" class="content-box">
            <h1 id="name">Luke Skywalker</h1>
            <p>Height: <span id="height">172</span></p>
            <p>Gender: <span id="gender">male</span></p>
            <p>Birth Year: <span id="birth-year">19BBY</span></p>
            <p>Home World: <span id="homeworld">Tatooine</span></p>
        </div>

        <button id="button">Find Someone</button>
    </div>

    <script src="EXERCISE 1.JS"></script>
</body>
</html>
