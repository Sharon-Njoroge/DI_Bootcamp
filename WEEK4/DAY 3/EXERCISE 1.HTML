<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Form Exercises</title>
</head>
<body>

    <h2>Exercise 1: GET Method</h2>
    <form action="index.html" method="GET">
        <label>Name: <input type="text" name="firstname"></label><br><br>
        <label>Message: <textarea name="user_message"></textarea></label><br><br>
        <button type="submit">Send (GET)</button>
    </form>

    <hr>

    <h2>Exercise 2: POST Method</h2>
    <form action="index.html" method="POST">
        <label>Name: <input type="text" name="firstname"></label><br><br>
        <label>Message: <textarea name="user_message"></textarea></label><br><br>
        <button type="submit">Send (POST)</button>
    </form>

    <script src="EXERCISE 1.JS"></script>
</body>
</html>
