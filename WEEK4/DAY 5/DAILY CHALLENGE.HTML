<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giphy Fetcher</title>
    <style>
        .gif-item { display: inline-block; margin: 10px; vertical-align: top; }
        .gif-item img { display: block; max-width: 200px; }
    </style>
</head>
<body>

    <h1>Giphy Randomizer</h1>

    <form id="search-form">
        <input type="text" id="search-input" placeholder="Enter a category (e.g. sun)" required>
        <button type="submit">Fetch GIF</button>
    </form>

    <button id="delete-all" style="margin-top: 10px; color: red;">DELETE ALL</button>

    <div id="gif-container"></div>

    <script src="DAILY CHALLENGE.JS"></script>
</body>
</html>
