<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="DAILY CHALLENGE.CSS">
</head>
<body>
    <div class="converter-card">
        <h1>Currency Converter</h1>
        
        <div class="input-group">
            <label>From:</label>
            <select id="fromCurrency"></select>
        </div>

        <div class="switch-container">
            <img src="switch_arrows.png" id="switchBtn" alt="Switch Currencies" title="Switch Currencies">
        </div>

        <div class="input-group">
            <label>To:</label>
            <select id="toCurrency"></select>
        </div>

        <div class="input-group">
            <label>Amount:</label>
            <div class="amount-row">
                <input type="number" id="amount" value="1" min="0">
                <button id="convertBtn">Convert</button>
            </div>
        </div>

        <div class="result-display" id="result">---</div>
    </div>

    <script src="DAILY CHALLENGE.JS"></script>
</body>
</html>
