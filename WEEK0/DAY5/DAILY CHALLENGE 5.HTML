<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 style="text-align: center; color: #333; margin-top: 20px;">CSS Animation Gallery</h1>

    <div class="container">
        <div class="fade"><span>Fade In</span></div>

        <div class="color"><span>Change Color</span></div>

        <div class="grow"><span>Grow</span></div>

        <div class="shrink"><span>Shrink</span></div>

        <div class="rotate"><span>Rotate</span></div>

        <div class="circle"><span>Circle</span></div>

        <div class="threed"><span>3D Shadow</span></div>

        <div class="swing"><span>Swing</span></div>

        <div class="border"><span>Inset Border</span></div>
    </div>

</body>
</html>
