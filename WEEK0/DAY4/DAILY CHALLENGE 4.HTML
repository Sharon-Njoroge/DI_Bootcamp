<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bootstrap Exercise</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<div class="row">

<!-- Sidebar -->
<div class="col-md-3 bg-light p-3">

<h4>Sidebar</h4>

<ul class="list-group">
<li class="list-group-item">Home</li>
<li class="list-group-item">Profile</li>
<li class="list-group-item">Messages</li>
<li class="list-group-item">Settings</li>
</ul>

</div>


<!-- Main Content -->
<div class="col-md-9">

<h2>Main Content</h2>


<!-- Exercise 2: Quote -->
<blockquote class="blockquote">
<p>"Success usually comes to those who are too busy to be looking for it."</p>
<footer class="blockquote-footer">Henry David Thoreau</footer>
</blockquote>


<!-- Search Form -->
<form class="d-flex mb-4">
<input class="form-control me-2" type="search" placeholder="Search">
<button class="btn btn-primary" type="submit">Search</button>
</form>


<!-- Table -->
<table class="table table-striped">
<thead>
<tr>
<th>Name</th>
<th>Course</th>
<th>Grade</th>
</tr>
</thead>

<tbody>
<tr>
<td>John</td>
<td>Web Design</td>
<td>A</td>
</tr>

<tr>
<td>Mary</td>
<td>Programming</td>
<td>B+</td>
</tr>

<tr>
<td>James</td>
<td>Database</td>
<td>A-</td>
</tr>
</tbody>
</table>


<!-- Exercise 3: Danger Alert -->
<div class="alert alert-danger">
Warning! Something went wrong.
</div>


<!-- Images with Borders -->
<div class="row">

<div class="col-md-4">
<img src="https://via.placeholder.com/150" class="img-fluid border border-dark">
</div>

<div class="col-md-4">
<img src="https://via.placeholder.com/150" class="img-fluid border border-dark">
</div>

<div class="col-md-4">
<img src="https://via.placeholder.com/150" class="img-fluid border border-dark">
</div>

</div>

</div>

</div>

</div>

</body>
</html>
